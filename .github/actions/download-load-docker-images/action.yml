name: 'Download and Load Docker Images'
description: 'Downloads and loads Docker images for integration/system tests'

inputs:
  artifact-name-pattern:
    description: 'Artifact name pattern for docker images (e.g., backend, or * for all)'
    required: false
    default: 'backend'

  download-path:
    description: 'Path to download artifacts to'
    required: false
    default: '/${{ runner.temp }}/build'

runs:
  using: 'composite'
  steps:
    - name: download docker images (single artifact)
      if: inputs.artifact-name-pattern != '*'
      uses: actions/download-artifact@v8
      with:
        name: docker-buildx-images-${{ runner.os }}-${{ github.sha }}-${{ inputs.artifact-name-pattern }}
        path: ${{ inputs.download-path }}

    - name: download docker images (all artifacts)
      if: inputs.artifact-name-pattern == '*'
      uses: actions/download-artifact@v8
      with:
        pattern: docker-buildx-images-${{ runner.os }}-${{ github.sha }}-*
        path: ${{ inputs.download-path }}

    - name: load docker images
      shell: bash
      run: make load-images local-src=${{ inputs.download-path }}
