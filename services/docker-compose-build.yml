#
# Build services to a specific target stage and tags them as 'local/{service}:${BUILD_TARGET}'
#
#  - BUILD_TARGET (build_target_required) must be set as 'production', 'development' or 'cache'. Used as image tag
#
# NOTE: linter error 'missing image' happens with the file is called 'docker-compose.build.yml'
#
# NOTE: service-integration is NOT a stack service but an executable of the service-integration library
#
# NOTE: the dask-scheduler uses the same image as the dask-sidecar. there is no need to build it twice!
#
services:
  # Shared base images consumed by every python service Dockerfile via
  # `FROM ${DOCKER_REGISTRY}/simcore-{runtime,build}-base:${BASE_TAG}`.
  #
  # - On local/test builds (no push) the Makefile links these targets in-memory as
  #   build contexts, so no registry is needed (see scripts/common.Makefile / root Makefile).
  # - On deploy (push) builds the service FROM pulls the pre-built & pushed base images.
  #
  # NOTE: these targets are NOT part of SERVICES_NAMES_TO_BUILD, they are only built
  # when referenced (as a build context or explicitly via `make build-base`).
  simcore-runtime-base:
    image: ${DOCKER_REGISTRY:-itisfoundation}/simcore-runtime-base:${BASE_TAG:-latest}
    build:
      context: ../
      dockerfile: services/_base_images/Dockerfile
      target: runtime-base

  simcore-build-base:
    image: ${DOCKER_REGISTRY:-itisfoundation}/simcore-build-base:${BASE_TAG:-latest}
    build:
      context: ../
      dockerfile: services/_base_images/Dockerfile
      target: build-base

  service-integration:
    image: local/service-integration:${BUILD_TARGET:?build_target_required}
    build:
      context: ../
      dockerfile: packages/service-integration/Dockerfile
      cache_from:
        - local/service-integration:${BUILD_TARGET:?build_target_required}
        - ${DOCKER_REGISTRY:-itisfoundation}/service-integration:master-github-latest
        - ${DOCKER_REGISTRY:-itisfoundation}/service-integration:staging-github-latest
        - ${DOCKER_REGISTRY:-itisfoundation}/service-integration:release-github-latest
      target: ${BUILD_TARGET:?build_target_required}
      labels:
        org.opencontainers.image.title: "service-integration"
        org.opencontainers.image.created: "${BUILD_DATE}"
        org.opencontainers.image.source: "${VCS_URL}"
        org.opencontainers.image.revision: "${VCS_REF}"
        org.opencontainers.image.description: "osparc-simcore service-integration service"
        org.opencontainers.image.documentation: "https://github.com/ITISFoundation/osparc-simcore#readme"
        org.opencontainers.image.version: "${SERVICE_INTEGRATION_API_VERSION}"
        org.opencontainers.image.vendor: "IT'IS Foundation"
        org.opencontainers.image.licenses: "MIT"

  # Services below are part of the osparc-simcore stack ---------------------------

  api-server:
    image: local/api-server:${BUILD_TARGET:?build_target_required}
    build:
      context: ../
      dockerfile: services/api-server/Dockerfile
