# Development/operational tooling services
#
# NOTES:
# - This file is composed on top of docker-compose.yml (requires the default network defined there)
# - Services here are auxiliary developer tools, not part of the core simcore stack
# - No ports are published here; use docker-compose.local.yml for local port bindings
#
services:
  flower:
    # Celery task monitoring UI — https://flower.readthedocs.io
    image: mher/flower:2.0.1
    init: true
    environment:
      CELERY_BROKER_URL: amqp://${RABBIT_USER}:${RABBIT_PASSWORD}@rabbit:${RABBIT_PORT}//
    networks:
      - default
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5555/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  default:
    name: ${SWARM_STACK_NAME}_default
    external: true
