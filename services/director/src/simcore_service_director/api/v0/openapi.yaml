components:
  schemas:
    Envelope_dict_str__Any__:
      properties:
        data:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Data
        error:
          anyOf:
          - {}
          - type: 'null'
          title: Error
      title: Envelope[dict[str, Any]]
      type: object
    Envelope_list_dict_str__Any___:
      properties:
        data:
          anyOf:
          - items:
              additionalProperties: true
              type: object
            type: array
          - type: 'null'
          title: Data
        error:
          anyOf:
          - {}
          - type: 'null'
          title: Error
      title: Envelope[list[dict[str, Any]]]
      type: object
    HTTPValidationError:
      properties:
        errors:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Validation errors
          type: array
      title: HTTPValidationError
      type: object
    ServiceType:
      enum:
      - computational
      - dynamic
      - frontend
      - backend
      title: ServiceType
      type: string
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
    _ErrorMessage:
      properties:
        message:
          title: Message
          type: string
      required:
      - message
      title: _ErrorMessage
      type: object
info:
  description: Director-v0 service
  title: simcore-service-director
  version: 1.0.0
openapi: 3.1.0
paths:
  /v0/running_interactive_services:
    get:
      operationId: list_running_services_v0_running_interactive_services_get
      parameters:
      - in: query
        name: user_id
        required: false
        schema:
          anyOf:
          - exclusiveMinimum: 0
            type: integer
          - type: 'null'
          title: User Id
      - in: query
        name: project_id
        required: false
        schema:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Project Id
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope_list_dict_str__Any___'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List Running Services
      tags:
      - services
    post:
      operationId: start_service_v0_running_interactive_services_post
      parameters:
      - in: query
        name: user_id
        required: true
        schema:
          exclusiveMinimum: 0
          title: User Id
          type: integer
      - in: query
        name: project_id
        required: true
        schema:
          format: uuid
          title: Project Id
          type: string
      - in: query
        name: service_key
        required: true
        schema:
          pattern: ^simcore/services/(?P<type>(comp|dynamic|frontend))/(?P<subdir>[a-z0-9][a-z0-9_.-]*/)*(?P<name>[a-z0-9-_]+[a-z0-9])$
          title: Service Key
          type: string
      - in: query
        name: service_uuid
        required: true
        schema:
          format: uuid
          title: Service Uuid
          type: string
      - in: query
        name: service_basepath
        required: false
        schema:
          default: .
          format: path
          title: Service Basepath
          type: string
      - in: query
        name: service_tag
        required: false
        schema:
          anyOf:
          - pattern: ^(0|[1-9]\d*)(\.(0|[1-9]\d*)){2}(-(0|[1-9]\d*|\d*[-a-zA-Z][-\da-zA-Z]*)(\.(0|[1-9]\d*|\d*[-a-zA-Z][-\da-zA-Z]*))*)?(\+[-\da-zA-Z]+(\.[-\da-zA-Z-]+)*)?$
            type: string
          - type: 'null'
          title: Service Tag
      - in: header
        name: x-simcore-user-agent
        required: true
        schema:
          title: X-Simcore-User-Agent
          type: string
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope_dict_str__Any__'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Start Service
      tags:
      - services
  /v0/running_interactive_services/{service_uuid}:
    delete:
      operationId: stop_service_v0_running_interactive_services__service_uuid__delete
      parameters:
      - in: path
        name: service_uuid
        required: true
        schema:
          format: uuid
          title: Service Uuid
          type: string
      - in: query
        name: save_state
        required: false
        schema:
          default: true
          title: Save State
          type: boolean
      responses:
        '204':
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Stop Service
      tags:
      - services
    get:
      operationId: get_running_service_v0_running_interactive_services__service_uuid__get
      parameters:
      - in: path
        name: service_uuid
        required: true
        schema:
          format: uuid
          title: Service Uuid
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope_dict_str__Any__'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Running Service
      tags:
      - services
  /v0/services:
    get:
      operationId: list_services_v0_services_get
      parameters:
      - in: query
        name: service_type
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/ServiceType'
          - type: 'null'
          title: Service Type
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope_list_dict_str__Any___'
          description: Successful Response
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_ErrorMessage'
          description: Could not connect with Docker Registry
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_ErrorMessage'
          description: Unexpected error
      summary: List Services
      tags:
      - services
  /v0/services/{service_key}/{service_version}:
    get:
      operationId: get_service_v0_services__service_key___service_version__get
      parameters:
      - in: path
        name: service_key
        required: true
        schema:
          pattern: ^simcore/services/(?P<type>(comp|dynamic|frontend))/(?P<subdir>[a-z0-9][a-z0-9_.-]*/)*(?P<name>[a-z0-9-_]+[a-z0-9])$
          title: Service Key
          type: string
      - in: path
        name: service_version
        required: true
        schema:
          pattern: ^(0|[1-9]\d*)(\.(0|[1-9]\d*)){2}(-(0|[1-9]\d*|\d*[-a-zA-Z][-\da-zA-Z]*)(\.(0|[1-9]\d*|\d*[-a-zA-Z][-\da-zA-Z]*))*)?(\+[-\da-zA-Z]+(\.[-\da-zA-Z-]+)*)?$
          title: Service Version
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope_list_dict_str__Any___'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Service
      tags:
      - services
  /v0/services/{service_key}/{service_version}/labels:
    get:
      operationId: list_service_labels_v0_services__service_key___service_version__labels_get
      parameters:
      - in: path
        name: service_key
        required: true
        schema:
          pattern: ^simcore/services/(?P<type>(comp|dynamic|frontend))/(?P<subdir>[a-z0-9][a-z0-9_.-]*/)*(?P<name>[a-z0-9-_]+[a-z0-9])$
          title: Service Key
          type: string
      - in: path
        name: service_version
        required: true
        schema:
          pattern: ^(0|[1-9]\d*)(\.(0|[1-9]\d*)){2}(-(0|[1-9]\d*|\d*[-a-zA-Z][-\da-zA-Z]*)(\.(0|[1-9]\d*|\d*[-a-zA-Z][-\da-zA-Z]*))*)?(\+[-\da-zA-Z]+(\.[-\da-zA-Z-]+)*)?$
          title: Service Version
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope_dict_str__Any__'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List Service Labels
      tags:
      - services
